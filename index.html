<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensi Elite PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

.header {
  padding: 20px;
  font-size: 24px;
  font-weight: bold;
}

.search {
  margin: 10px 20px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  width: calc(100% - 40px);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">SENSI ELITE 🔥</div>

<input class="search" placeholder="Buscar...">

<div class="grid">
  <div class="card">Sensi Freestyle</div>
  <div class="card">Sensi Suprema</div>
  <div class="card">Sensibilidad L-Gang</div>
  <div class="card">Sensi Panel</div>
</div>

</body>
</html>
