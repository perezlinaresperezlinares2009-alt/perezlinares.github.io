<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox AI - Owner Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #05070a; color: #e5e7eb; }
        .roblox-font { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; }
        .glass { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .owner-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.3); border: 1px solid rgba(234, 179, 8, 0.5) !important; }
    </style>
</head>
<body>

    <nav class="p-4 border-b border-white/5 glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/30"><i class="fa-solid fa-crown text-white"></i></div>
                <h1 class="roblox-font text-2xl text-white uppercase">Roblox <span id="brandName" class="text-blue-500">Auto-Dev</span></h1>
            </div>
            <div id="creditBox" class="bg-[#111827] border border-yellow-500/30 px-5 py-2 rounded-full flex items-center gap-2">
                <i class="fa-solid fa-bolt text-yellow-500"></i>
                <span id="creditDisplay" class="font-black text-yellow-500 text-lg">0</span>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-6 space-y-8">
        <div id="mainCard" class="glass p-8 rounded-[2.5rem] shadow-2xl space-y-6">
            <h2 class="text-xl font-black text-center text-blue-400 uppercase tracking-widest">Inyector de Scripts IA</h2>
            
            <textarea id="prompt" oninput="checkOwnerKey()" class="w-full bg-[#0a0f1a] border border-white/10 rounded-3xl p-6 text-lg outline-none h-44 focus:ring-2 focus:ring-blue-500 transition-all"
                placeholder="Ej: Crea un juego de parkour con panel de admin..."></textarea>
            
            <div class="flex flex-col gap-4">
                <button id="shareBtn" onclick="compartirParaUno()" class="w-full bg-green-600 hover:bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-share-nodes"></i> Compartir para ganar 1 Crédito
                </button>

                <button id="genBtn" onclick="inyectar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-blue-900/40 transition-all">
                    Generar Proyecto (1 Cr.)
                </button>
            </div>
        </div>

        <div id="injectionPanel" class="hidden animate-in fade-in slide-in-from-bottom-5 space-y-4">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2.5rem] text-center shadow-2xl">
                <p class="text-white/70 text-[10px] font-black uppercase mb-2">Token de Permiso Studio</p>
                <h3 id="tokenID" class="text-white text-5xl font-black font-mono tracking-tighter italic">-----</h3>
                <p class="text-blue-100 text-[10px] mt-4 opacity-70">Usa este token en tu Plugin para importar el juego.</p>
            </div>
        </div>
    </main>

    <script>
        // CONFIGURACIÓN DE DUEÑO
        const LLAVE_MAESTRA = "ADMIN777"; // <--- CAMBIA ESTO POR TU PROPIA CONTRASEÑA
        let créditos = 0;
        let esDueño = false;

        function checkOwnerKey() {
            const input = document.getElementById('prompt').value;
            const card = document.getElementById('mainCard');
            const brand = document.getElementById('brandName');
            const shareBtn = document.getElementById('shareBtn');

            if (input.includes(LLAVE_MAESTRA)) {
                esDueño = true;
                créditos = 999999;
                card.classList.add('owner-glow');
                brand.innerText = "OWNER MODE";
                brand.style.color = "#eab308";
                shareBtn.style.display = "none"; // El dueño no necesita compartir
                actualizarUI();
                alert("👑 MODO DUEÑO ACTIVADO: Créditos Infinitos.");
            }
        }

        function compartirParaUno() {
            window.open('https://api.whatsapp.com/send?text=Mira esta IA de Roblox!', '_blank');
            setTimeout(() => {
                créditos += 1; // <--- AHORA SOLO DA 1
                actualizarUI();
                alert("✅ Has ganado 1 crédito por compartir.");
            }, 1000);
        }

        function actualizarUI() {
            document.getElementById('creditDisplay').innerText = esDueño ? "∞" : créditos;
        }

        function inyectar() {
            const p = document.getElementById('prompt').value;
            if (créditos < 1 && !esDueño) return alert("❌ No tienes créditos. Comparte la web.");
            
            const btn = document.getElementById('genBtn');
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-sync animate-spin mr-2"></i> CONECTANDO...`;

            setTimeout(() => {
                const token = "DEV-" + Math.floor(Math.random() * 90000 + 10000);
                document.getElementById('tokenID').innerText = token;
                document.getElementById('injectionPanel').classList.remove('hidden');

                if (!esDueño) créditos -= 1; // Solo descuenta si no eres el dueño
                actualizarUI();

                btn.disabled = false;
                btn.innerText = "Generar Proyecto (1 Cr.)";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
