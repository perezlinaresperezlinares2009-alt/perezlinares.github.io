<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0a2a3f);
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

/* TABS */
.tabs{
    display:flex;
    gap:10px;
    padding:10px;
}

.tab{
    padding:8px 15px;
    border-radius:20px;
    background:#1c2b3a;
    cursor:pointer;
}

.active{
    background:#19a7ce;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.btn{
    background:#1c2b3a;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

/* PANEL */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000a;
    display:none;
    justify-content:center;
    align-items:center;
}

.panel{
    width:90%;
    max-width:400px;
    background:#0f2233;
    padding:20px;
    border-radius:20px;
}

input{
    width:100%;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#19a7ce;
    color:white;
}
</style>
</head>

<body>

<div class="header">GG SENSI 🔥</div>

<div class="tabs">
<div class="tab active" onclick="mostrar('top')">🔥 Top</div>
<div class="tab" onclick="mostrar('guardados')">💾 Guardados</div>
<div class="tab" onclick="vip()">👑 VIP</div>
</div>

<!-- TOP -->
<div id="top" class="grid">

<div class="btn" onclick="abrir('lince')">🐯 Lince FF</div>
<div class="btn" onclick="abrir('marechal')">👑 Marechal</div>

<div class="btn" onclick="abrir('two9')">💀 Two9</div>
<div class="btn" onclick="abrir('santana')">🔥 Santana</div>

<div class="btn" onclick="abrir('boyka')">💀 Boyka</div>
<div class="btn" onclick="abrir('ruso')">❄️ Ruso</div>

</div>

<div id="guardados" class="grid" style="display:none">
<div class="btn">No tienes guardados</div>
</div>

<!-- PANEL -->
<div class="overlay" id="panel" onclick="cerrar(event)">
<div class="panel">

<h3>Ajustes de sensibilidad</h3>

<p>General <span id="g"></span></p>
<input type="range" max="200" oninput="g.innerText=this.value">

<p>Punto rojo <span id="p"></span></p>
<input type="range" max="200" oninput="p.innerText=this.value">

<p>Mira 2x <span id="m2"></span></p>
<input type="range" max="200" oninput="m2.innerText=this.value">

<p>Mira 4x <span id="m4"></span></p>
<input type="range" max="200" oninput="m4.innerText=this.value">

<p>Mira Franco <span id="mf"></span></p>
<input type="range" max="200" oninput="mf.innerText=this.value">

<p>Cámara Libre <span id="cl"></span></p>
<input type="range" max="200" oninput="cl.innerText=this.value">

<h4>Dispositivo</h4>
<p>DPI: <span id="dpi"></span></p>
<p>Tamaño Botón: <span id="boton"></span></p>

<button>Guardar Configuración</button>

</div>
</div>

<script>

// 🔥 SENSIBILIDADES TOP (las de tus imágenes)
const sensis = {

lince:[145,124,179,162,101,100,300,55],
marechal:[175,126,158,175,185,171,499,58],
two9:[195,70,160,181,27,0,500,36],
santana:[195,173,158,190,22,84,735,61],
boyka:[200,96,42,68,54,58,450,44],
ruso:[200,200,173,163,163,159,1500,100]

};

function abrir(tipo){
let s=sensis[tipo];
let sliders=document.querySelectorAll("input");

g.innerText=s[0]; sliders[0].value=s[0];
p.innerText=s[1]; sliders[1].value=s[1];
m2.innerText=s[2]; sliders[2].value=s[2];
m4.innerText=s[3]; sliders[3].value=s[3];
mf.innerText=s[4]; sliders[4].value=s[4];
cl.innerText=s[5]; sliders[5].value=s[5];

dpi.innerText=s[6];
boton.innerText=s[7];

panel.style.display="flex";
}

function cerrar(e){
if(e.target.id==="panel"){
panel.style.display="none";
}
}

// TABS
function mostrar(id){
top.style.display="none";
guardados.style.display="none";

document.getElementById(id).style.display="grid";
}

// 🔐 VIP CON 3 INTENTOS
function vip(){

let hoy = new Date().toDateString();

if(localStorage.fecha !== hoy){
localStorage.intentos = 3;
localStorage.fecha = hoy;
}

if(localStorage.intentos <= 0){
alert("❌ Sin intentos hoy");
return;
}

let pass = prompt("Contraseña VIP:");

if(pass === "44400978"){
alert("✅ Bienvenido VIP");
}else{
localStorage.intentos--;
alert("❌ Incorrecta | Intentos: " + localStorage.intentos);
}
}

</script>

</body>
</html>
