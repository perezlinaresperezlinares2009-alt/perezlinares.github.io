<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0a2a3f);
    color:white;
}

.header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    padding:10px 15px;
    background:#123a55;
    border-radius:20px;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:#1a2f45;
    padding:15px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
}

.section{ display:none; padding:15px; }
.active{ display:block; }

.panel{
    background:#102636;
    padding:15px;
    border-radius:15px;
    margin-top:15px;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00ffcc,#00ccff);
}
</style>
</head>

<body>

<div class="header">SENSI ELITE 🔥</div>

<div class="tabs">
    <div class="tab" onclick="mostrar('tops')">🔥 Tops</div>
    <div class="tab" onclick="mostrar('guardados')">💾 Guardados</div>
    <div class="tab" onclick="mostrar('vip')">🔒 VIP</div>
</div>

<!-- TOPS -->
<div id="tops" class="section active">
    <div class="grid">
        <div class="card" onclick="cargarSensi('dragon')">🐉 Dragon Headshot</div>
        <div class="card" onclick="cargarSensi('demon')">😈 Demon Aimlock</div>
        <div class="card" onclick="cargarSensi('ghost')">👻 Ghost Precision</div>
        <div class="card" onclick="cargarSensi('toxic')">☠️ Toxic Destroyer</div>
    </div>

    <!-- PANEL DONDE SALE LA SENSI -->
    <div class="panel" id="panelSensi">
        <h3>Sensibilidad</h3>
        <p id="datos">Selecciona una sensi...</p>

        <button class="btn" onclick="guardar()">Guardar</button>
    </div>
</div>

<!-- GUARDADOS -->
<div id="guardados" class="section">
    <h3>Guardados</h3>
    <div id="lista"></div>
</div>

<!-- VIP -->
<div id="vip" class="section">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn" onclick="entrarVIP()">Entrar</button>

    <div id="vipContenido" style="display:none;">
        <h3>Sensis VIP 🔥</h3>
        <p onclick="cargarSensi('vip1')">🔥 VIP PRO MAX</p>
    </div>
</div>

<script>

// CAMBIAR SECCIONES
function mostrar(id){
    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// BASE DE SENSIS
let sensis = {
    dragon: "General: 100 | Punto rojo: 95 | Mira 2x: 90 | Mira 4x: 85",
    demon: "General: 100 | Punto rojo: 98 | Mira 2x: 92 | Mira 4x: 88",
    ghost: "General: 95 | Punto rojo: 90 | Mira 2x: 85 | Mira 4x: 80",
    toxic: "General: 100 | Punto rojo: 100 | Mira 2x: 95 | Mira 4x: 90",
    vip1: "General: 100 | Punto rojo: 100 | Mira 2x: 100 | Mira 4x: 100 🔥"
};

let actual = "";

// MOSTRAR SENSI AL HACER CLICK
function cargarSensi(nombre){
    actual = nombre;
    document.getElementById("datos").innerText = sensis[nombre];
}

// GUARDAR
function guardar(){
    if(actual === "") return;

    let lista = JSON.parse(localStorage.getItem("guardados") || "[]");
    lista.push(sensis[actual]);
    localStorage.setItem("guardados", JSON.stringify(lista));

    alert("Guardado 🔥");
    mostrarGuardados();
}

// MOSTRAR GUARDADOS
function mostrarGuardados(){
    let lista = JSON.parse(localStorage.getItem("guardados") || "[]");
    let cont = document.getElementById("lista");
    cont.innerHTML = "";

    lista.forEach(item=>{
        let p = document.createElement("p");
        p.innerText = item;
        cont.appendChild(p);
    });
}

mostrarGuardados();

// VIP
function entrarVIP(){
    let pass = document.getElementById("pass").value;

    if(pass === "44400978"){
        document.getElementById("vipContenido").style.display="block";
        alert("VIP ACTIVADO 🔥");
    } else {
        alert("Incorrecto ❌");
    }
}

</script>

</body>
    </html>
